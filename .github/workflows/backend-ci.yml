name: Echo Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_ENV: test
  PORT: 8080
  MONGODB_URI: mongodb://127.0.0.1:27017/echo_test
  JWT_SECRET: ci-test-jwt-secret-string-at-least-32-chars-long
  ADMIN_USERNAME: ci-admin
  VISITOR_HASH_SALT: ci-visitor-hash-salt

jobs:
  validate:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint codebase
        run: npm run lint

      - name: Typecheck codebase
        run: npm run typecheck

      - name: Run test suite
        run: npm run test -- --run

      - name: Build production bundle
        run: npm run build

