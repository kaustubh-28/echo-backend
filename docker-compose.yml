services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echo-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8088}:8088"
    environment:
      NODE_ENV: production
      PORT: 8088
      MONGODB_URI: mongodb://mongo:27017/echo
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY:-}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      VISITOR_HASH_SALT: ${VISITOR_HASH_SALT:?VISITOR_HASH_SALT is required}
      COOKIE_SIGNING_SECRET: ${COOKIE_SIGNING_SECRET:?COOKIE_SIGNING_SECRET is required}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8088/api/v1/health/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - echo-network

  mongo:
    image: mongo:7
    container_name: echo-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - echo-network

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: echo-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
      ME_CONFIG_BASICAUTH: "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - echo-network

volumes:
  mongo_data:

networks:
  echo-network:
    driver: bridge
